services:
  standup-bot:
    build: .
    ports:
      - "${PORT:-5000}:5000"
    environment:
      - PORT=5000
      - DB_PATH=/data/standup.db
      - TOKEN_STORE_PATH=/data/tokens.json
      - PUMBLE_ADDON_MANIFEST_PATH=./manifest.json
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - RETENTION_DAYS=${RETENTION_DAYS:-90}
    env_file:
      - .env
    volumes:
      - standup-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  standup-data:
